<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { font-family: Arial, sans-serif; margin: 0; padding: 10px; background-color: #fff; }
    .event-list { width: 100%; border-collapse: collapse; font-size: 13px; }
    .event-row { border-bottom: 1px solid #e0e0e0; }
    .date-cell { padding: 12px 8px; width: 110px; vertical-align: top; background-color: #f9f9f9; color: #333; line-height: 1.3; }
    .info-cell { padding: 12px 8px; vertical-align: top; line-height: 1.4; }
    .title { font-size: 15px; color: #111; font-weight: bold; margin-bottom: 3px; display: inline-block; }
    .hall { color: #d32f2f; font-weight: bold; }
    .impact { background-color: #fff3cd; color: #856404; padding: 2px 6px; border-radius: 3px; font-size: 11px; font-weight: bold; display: inline-block; margin-top: 4px; }
    .note { font-size: 12px; color: #555; margin-top: 4px; }
  </style>
</head>
<body>

  <div id="events-container">Laddar händelser...</div>

  <script>
    const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTOQelFLsbE3f76MT1VwYeuEJzGwK0J1dyY2WgEmjPhWytLugTLq0UENWUUFO5LXP0B0TQiYBEprODm/pub?gid=0&single=true&output=csv';

    async function loadEvents() {
      try {
        const response = await fetch(csvUrl);
        const data = await response.text();
        
        const rows = data.split('\n').map(row => row.trim()).filter(row => row.length > 0);
        
        if (rows.length <= 1) {
          document.getElementById('events-container').innerHTML = '<p style="color:#666;font-style:italic;">Inga avvikelser eller externa bokningar just nu.</p>';
          return;
        }

        let html = '<table class="event-list"><tbody>';

        for (let i = 1; i < rows.length; i++) {
          const cols = rows[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(c => c.replace(/^"|"$/g, '').trim());
          
          const datum = cols[0] || '';
          const aktivitet = cols[1] || '';
          const tid = cols[2] || '';
          const hall = cols[3] || '';
          const paverkan = cols[4] || ''; // T.ex. "Inställd träning" eller "Begränsad yta"

          html += `
            <tr class="event-row">
              <td class="date-cell"><strong>${datum}</strong></td>
              <td class="info-cell">
                <span class="title">${aktivitet}</span><br>
                ${tid ? `<span><strong>Tid:</strong> ${tid}</span> | ` : ''}
                ${hall ? `<span class="hall">${hall}</span>` : ''}<br>
                ${paverkan ? `<span class="impact">⚠️ ${paverkan}</span>` : ''}
              </td>
            </tr>
          `;
        }

        html += '</tbody></table>';
        document.getElementById('events-container').innerHTML = html;

      } catch (error) {
        document.getElementById('events-container').innerHTML = '<p>Kunde inte ladda listan just nu.</p>';
      }
    }

    loadEvents();
  </script>
</body>
</html>
