<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { font-family: Arial, sans-serif; margin: 0; padding: 10px; background-color: #fff; }
    .event-list { width: 100%; border-collapse: collapse; font-size: 13px; }
    
    /* Månadsrubrik */
    .month-header { background-color: #333; color: #fff; font-weight: bold; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; }
    .month-header td { padding: 8px 10px; }

    /* Händelserader */
    .event-row { border-bottom: 1px solid #e0e0e0; }
    
    /* Datumkolumnen */
    .date-cell { padding: 12px 8px; width: 110px; vertical-align: top; background-color: #f9f9f9; text-align: center; border-right: 2px solid #ddd; }
    .day-number { font-size: 15px; font-weight: bold; color: #111; line-height: 1.2; word-break: break-word; }
    .day-name { font-size: 10px; color: #666; text-transform: uppercase; margin-top: 4px; font-weight: bold; }
    
    /* Informationskolumnen */
    .info-cell { padding: 12px 12px; vertical-align: top; line-height: 1.4; }
    .title { font-size: 15px; color: #111; font-weight: bold; margin-bottom: 3px; display: inline-block; }
    .details { color: #444; font-size: 12px; margin-top: 2px; }
    .hall-row { color: #d32f2f; font-weight: bold; font-size: 12px; margin-top: 2px; }
    .impact { background-color: #fff3cd; color: #856404; padding: 2px 6px; border-radius: 3px; font-size: 11px; font-weight: bold; display: inline-block; margin-top: 5px; }
  </style>
</head>
<body>

  <div id="events-container">Laddar händelser...</div>

  <script>
    const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTOQelFLsbE3f76MT1VwYeuEJzGwK0J1dyY2WgEmjPhWytLugTLq0UENWUUFO5LXP0B0TQiYBEprODm/pub?gid=0&single=true&output=csv';

    async function loadEvents() {
      try {
        const response = await fetch(csvUrl);
        if (!response.ok) {
          throw new Error('Kunde inte läsa kalkylbladet (Status: ' + response.status + ')');
        }
        
        const data = await response.text();
        const rows = data.split('\n').map(row => row.trim()).filter(row => row.length > 0);
        
        if (rows.length <= 1) {
          document.getElementById('events-container').innerHTML = '<p style="color:#666;font-style:italic;">Inga händelser inlagda i kalkylbladet.</p>';
          return;
        }

        const now = new Date();
        const currentMonthStart = new Date(now.getFullYear(), now.getMonth(), 1);

        let html = '<table class="event-list"><tbody>';
        let currentMonthKey = '';
        let eventsShown = 0;

        for (let i = 1; i < rows.length; i++) {
          const cols = rows[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(c => c.replace(/^"|"$/g, '').trim());
          
          const rawDatum = cols[0] || '';
          const aktivitet = cols[1] || '';
          const tid = cols[2] || '';
          const hall = cols[3] || '';
          const paverkan = cols[4] || '';

          if (!rawDatum) continue;

          let dayDisplay = '';
          let dayName = '';
          let eventDate = null;

          // HUVUDLOGIK FÖR DATUM OCH INTERVALL (MED /)
          if (rawDatum.includes('/')) {
            const parts = rawDatum.split('/');
            const startStr = parts[0].trim();
            const endStr = parts[1].trim();

            const startDate = new Date(startStr);
            const endDate = new Date(endStr);
            eventDate = startDate;

            if (!isNaN(startDate.getTime()) && !isNaN(endDate.getTime())) {
              const startDay = startDate.getDate();
              const endDay = endDate.getDate();

              const isDifferentMonth = startDate.getMonth() !== endDate.getMonth() || startDate.getFullYear() !== endDate.getFullYear();

              if (isDifferentMonth) {
                // Över månads- eller årsskifte
                const startMonthShort = startDate.toLocaleDateString('sv-SE', { month: 'short' }).replace('.', '');
                const endMonthShort = endDate.toLocaleDateString('sv-SE', { month: 'short' }).replace('.', '');
                dayDisplay = `${startDay} ${startMonthShort} – ${endDay} ${endMonthShort}`;
              } else {
                // Samma månad
                dayDisplay = `${startDay} – ${endDay}`;
              }
              dayName = 'Multi-dag';
            } else {
              dayDisplay = rawDatum;
            }
          } else {
            // Enkelt datum (YYYY-MM-DD)
            eventDate = new Date(rawDatum);
            if (!isNaN(eventDate.getTime())) {
              dayDisplay = eventDate.getDate();
              dayName = eventDate.toLocaleDateString('sv-SE', { weekday: 'short' }).replace('.', '');
            } else {
              dayDisplay = rawDatum;
            }
          }

          // Dölj endast om händelsen (eller startdatumet) inträffade FÖRE innevarande månad
          if (eventDate && !isNaN(eventDate.getTime())) {
            const eventMonthStart = new Date(eventDate.getFullYear(), eventDate.getMonth(), 1);
            if (eventMonthStart < currentMonthStart) {
              continue;
            }
          }

          eventsShown++;

          // Månadsrubrik
          let monthName = '';
          if (eventDate && !isNaN(eventDate.getTime())) {
            monthName = eventDate.toLocaleDateString('sv-SE', { month: 'long', year: 'numeric' });
          }

          if (monthName && monthName !== currentMonthKey) {
            currentMonthKey = monthName;
            html += `
              <tr class="month-header">
                <td colspan="2">${monthName}</td>
              </tr>
            `;
          }

          html += `
            <tr class="event-row">
              <td class="date-cell">
                <div class="day-number">${dayDisplay}</div>
                ${dayName ? `<div class="day-name">${dayName}</div>` : ''}
              </td>
              <td class="info-cell">
                ${aktivitet ? `<span class="title">${aktivitet}</span><br>` : ''}
                ${tid ? `<div class="details"><strong>Tid:</strong> ${tid}</div>` : ''}
                ${hall ? `<div class="hall-row">Hall: ${hall}</div>` : ''}
                ${paverkan ? `<span class="impact">⚠️ ${paverkan}</span>` : ''}
              </td>
            </tr>
          `;
        }

        html += '</tbody></table>';

        if (eventsShown === 0) {
          document.getElementById('events-container').innerHTML = '<p style="color:#666;font-style:italic;">Inga kommande händelser inlagda.</p>';
        } else {
          document.getElementById('events-container').innerHTML = html;
        }

      } catch (error) {
        document.getElementById('events-container').innerHTML = '<p style="color:red;font-weight:bold;">Kunde inte ladda händelser: ' + error.message + '</p>';
      }
    }

    loadEvents();
  </script>
</body>
</html>
